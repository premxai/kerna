[plugin]
name = "calendar"
version = "1.0.0"
kind = "tool.mcp"
entrypoint = "mcp_server.py"
source = "kerna-starter-pack"
trust = "verified"
capabilities = ["list_events", "add_event"]
requires_approval = ["add_event"]
allowed_paths = ["./calendar.ics"]
declared_outputs = ["text"]
max_output_bytes = 50000
