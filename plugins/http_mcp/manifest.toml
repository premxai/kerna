[plugin]
name = "http"
version = "1.0.0"
kind = "tool.mcp"
entrypoint = "mcp_server.py"
source = "kerna-starter-pack"
trust = "verified"
capabilities = ["http_get", "http_post_json"]
requires_approval = ["http_post_json"]
network_allowlist = ["*"]
declared_outputs = ["text"]
max_output_bytes = 200000
