[plugin]
name = "notes"
version = "1.0.0"
kind = "tool.mcp"
entrypoint = "mcp_server.py"
source = "kerna-starter-pack"
trust = "verified"
capabilities = ["add_note", "list_notes", "read_note", "search_notes"]
requires_approval = ["add_note"]
allowed_paths = ["./notes"]
declared_outputs = ["text"]
max_output_bytes = 50000
