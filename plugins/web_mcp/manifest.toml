[plugin]
name = "web"
version = "1.0.0"
kind = "tool.mcp"
entrypoint = "mcp_server.py"
source = "kerna-starter-pack"
trust = "verified"
capabilities = ["fetch_url", "read_page_text"]
requires_approval = ["fetch_url", "read_page_text"]
network_allowlist = ["*"]
declared_outputs = ["text"]
max_output_bytes = 200000
