[plugin]
name = "google-calendar"
version = "0.1.0"
kind = "tool.mcp"
entrypoint = "mcp_server.py"
source = "kerna-curated"
trust = "verified"
capabilities = ["google_calendar_status", "google_list_events", "google_create_event"]
requires_approval = ["google_create_event"]
secrets = ["KERNA_GOOGLE_CALENDAR_CLIENT_ID", "KERNA_GOOGLE_CALENDAR_REFRESH_TOKEN"]
network_allowlist = ["accounts.google.com", "oauth2.googleapis.com", "www.googleapis.com"]
declared_outputs = ["text"]
max_output_bytes = 50000
