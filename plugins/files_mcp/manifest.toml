[plugin]
name = "files"
version = "1.0.0"
kind = "tool.mcp"
entrypoint = "mcp_server.py"
source = "kerna-starter-pack"
trust = "verified"
capabilities = ["read_file", "write_file", "list_dir", "search_text"]
requires_approval = ["write_file"]
allowed_paths = ["./"]
declared_outputs = ["text"]
max_output_bytes = 50000
