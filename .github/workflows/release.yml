name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: kerna
            asset: kerna-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            bin: kerna
            asset: kerna-macos-arm64
          - os: macos-13
            target: x86_64-apple-darwin
            bin: kerna
            asset: kerna-macos-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: kerna.exe
            asset: kerna-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
        working-directory: ./kernel

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p dist
          # Cargo workspace: the target dir lives at the repo root, not kernel/.
          cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "dist/${{ matrix.asset }}"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          name: Kerna ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/${{ matrix.asset }}
