name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: npm
        cache-dependency-path: ui/package-lock.json

    - name: Install Tauri system dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libwebkit2gtk-4.1-dev \
          build-essential curl wget file libxdo-dev libssl-dev \
          libayatana-appindicator3-dev librsvg2-dev
      
    - name: Rust Cache
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: ./kernel
      
    - name: Check formatting
      run: cargo fmt -- --check
      working-directory: ./kernel
      
    - name: Run clippy
      run: cargo clippy -- -D warnings
      working-directory: ./kernel
      
    - name: Install cargo-audit
      uses: taiki-e/install-action@cargo-audit

    - name: Security audit
      run: cargo audit      
    - name: Build binary
      run: cargo build
      working-directory: ./kernel
    - name: Run tests
      run: cargo test --verbose
      working-directory: ./kernel

    - name: Run Kerna Trust Bench
      if: matrix.os == 'ubuntu-latest'
      run: node benchmarks/kerna-trust/run.mjs --out reports/kerna-trust/ci.json

    - name: Run official MCP core client conformance
      if: matrix.os == 'ubuntu-latest'
      run: node benchmarks/mcp-conformance/run.mjs --out reports/mcp-conformance/ci

    - name: Run MCP transport performance smoke benchmark
      if: matrix.os == 'ubuntu-latest'
      run: node benchmarks/runtime-performance/run.mjs --runs 5 --iterations 10 --out reports/runtime-performance/ci.json

    - name: Upload Kerna Trust Bench report
      if: always() && matrix.os == 'ubuntu-latest'
      uses: actions/upload-artifact@v4
      with:
        name: kerna-trust-bench
        path: reports/kerna-trust/ci.json
        if-no-files-found: error

    - name: Upload MCP conformance report
      if: always() && matrix.os == 'ubuntu-latest'
      uses: actions/upload-artifact@v4
      with:
        name: mcp-conformance
        path: reports/mcp-conformance/ci
        if-no-files-found: error

    - name: Upload MCP transport performance report
      if: always() && matrix.os == 'ubuntu-latest'
      uses: actions/upload-artifact@v4
      with:
        name: runtime-performance
        path: reports/runtime-performance/ci.json
        if-no-files-found: error

    - name: Validate AgentDojo bridge scripts
      if: matrix.os == 'ubuntu-latest'
      run: python3 -m py_compile benchmarks/agentdojo/kerna_agentdojo_mcp.py benchmarks/agentdojo/preflight.py benchmarks/agentdojo/run.py

    - name: Install desktop dependencies
      run: npm ci
      working-directory: ./ui

    - name: Build desktop control surface
      run: npm run build
      working-directory: ./ui

    - name: Run desktop tests
      run: cargo test --verbose
      working-directory: ./ui/src-tauri

    - name: Lint desktop control surface
      run: cargo clippy -- -D warnings
      working-directory: ./ui/src-tauri

    - name: Smoke test (Linux/macOS)
      if: runner.os != 'Windows'
      run: bash scripts/smoke_test.sh
      shell: bash

    - name: Smoke test (Windows)
      if: runner.os == 'Windows'
      run: pwsh -File scripts/smoke_test.ps1
      shell: pwsh
